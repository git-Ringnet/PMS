<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm đặt cọc - PMS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #cbd5e1;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #2563eb;
        }
    </style>
</head>
<body class="p-4 md:p-6 flex items-center justify-center min-h-screen antialiased">

    <div class="w-full max-w-5xl bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-200 flex flex-col">
        
        <div class="bg-[#243c5a] text-white flex justify-between items-center px-4 py-2 border-b border-[#1a2d42]">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-400/20 p-1.5 rounded-lg">
                    <i class="fa-solid fa-file-invoice-dollar text-blue-200 text-xs"></i>
                </div>
                <span class="font-bold text-xs tracking-wide uppercase">Thêm đặt cọc</span>
            </div>
            <button class="text-slate-300 hover:text-white transition p-1.5 rounded-lg hover:bg-white/10">
                <i class="fa-solid fa-xmark text-sm"></i>
            </button>
        </div>

        <div class="p-4 bg-white flex flex-col space-y-3">
            
            <div class="w-1/2 pr-2">
                <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Tên đăng ký</label>
                <div class="relative">
                    <select class="w-full border border-slate-300 rounded-lg px-3 h-[30px] text-xs font-medium bg-white text-slate-800 appearance-none focus:outline-none focus:border-blue-500 shadow-sm cursor-pointer">
                        <option>123131</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-3 top-2 text-slate-400 pointer-events-none text-[10px]"></i>
                </div>
            </div>

            <div class="grid grid-cols-4 gap-3">
                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Số tiền <span class="text-rose-500">*</span></label>
                    <div class="relative">
                        <input type="text" value="0" class="w-full border border-blue-200 rounded-lg px-3 h-[30px] text-xs font-bold bg-blue-50/70 text-black focus:outline-none focus:border-blue-500 shadow-sm">
                        <div class="absolute right-1 top-0.5 flex flex-col">
                            <button class="text-slate-400 hover:text-blue-500 text-[8px] leading-none px-1"><i class="fa-solid fa-chevron-up"></i></button>
                            <button class="text-slate-400 hover:text-blue-500 text-[8px] leading-none px-1"><i class="fa-solid fa-chevron-down"></i></button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Phương thức đặt cọc <span class="text-rose-500">*</span></label>
                    <div class="relative h-[30px]">
                        <select class="w-full border border-blue-200 rounded-lg px-3 h-full text-xs font-medium bg-blue-50/70 text-black appearance-none focus:outline-none focus:border-blue-500 shadow-sm cursor-pointer">
                            <option>Phương thức đặt cọc</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-2 text-slate-400 pointer-events-none text-[10px]"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Tài khoản ngân hàng</label>
                    <div class="relative">
                        <select class="w-full border border-slate-300 rounded-lg px-3 h-[30px] text-xs bg-white text-slate-800 appearance-none focus:outline-none focus:border-blue-500 shadow-sm cursor-pointer">
                            <option>Tài khoản ngân hàng</option>
                        </select>
                        <i class="fa-solid fa-chevron-down absolute right-3 top-2 text-slate-400 pointer-events-none text-[10px]"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Ngày <span class="text-rose-500">*</span></label>
                    <div class="flex items-center space-x-2 border border-slate-300 rounded-lg px-3 h-[30px] bg-white shadow-sm text-xs font-medium text-slate-800">
                        <span class="flex-1">24 / 06 / 2026</span>
                        <i class="fa-regular fa-calendar-days text-blue-500 cursor-pointer"></i>
                        <i class="fa-regular fa-copy text-slate-400 hover:text-slate-600 cursor-pointer"></i>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Mô tả</label>
                    <textarea placeholder="Nhập mô tả..." class="w-full border border-blue-200 rounded-lg p-2 text-xs font-medium bg-blue-50/70 text-black focus:outline-none focus:border-blue-500 shadow-sm h-[56px] resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-[11px] text-slate-500 font-semibold mb-0.5">Lưu hình ảnh (Chứng từ / Biên lai)</label>
                    <div class="border border-dashed border-slate-300 rounded-lg h-[56px] bg-slate-50 flex items-center justify-center hover:bg-slate-100 hover:border-blue-400 transition cursor-pointer relative overflow-hidden group shadow-sm">
                        <input type="file" class="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*">
                        <div class="flex flex-col items-center space-y-1">
                            <i class="fa-solid fa-cloud-arrow-up text-slate-400 group-hover:text-blue-500 transition text-xs"></i>
                            <span class="text-[10px] text-slate-500 font-medium group-hover:text-blue-600 transition">Nhấp để tải ảnh lên hoặc kéo thả vào đây</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-50 p-3 border-t border-slate-200 flex-1 flex flex-col">
            
            <div class="flex justify-between items-end mb-1.5">
                <h3 class="font-bold text-slate-800 text-[11px] uppercase tracking-wider flex items-center">
                    Danh sách đặt cọc <span class="text-rose-500 ml-1">*</span>
                </h3>
                
                <div class="flex items-center space-x-3">
                    <div class="flex items-center space-x-2">
                        <span class="text-[11px] text-slate-500 font-medium">Hiển thị xoá</span>
                        <div class="relative inline-block w-6 align-middle select-none transition duration-200 ease-in">
                            <input type="checkbox" name="toggle" id="show-deleted" class="toggle-checkbox absolute block w-3 h-3 rounded-full bg-white border-2 border-slate-300 appearance-none cursor-pointer top-0 bottom-0 m-auto z-10 transition-transform duration-200 ease-in-out left-0"/>
                            <label for="show-deleted" class="toggle-label block overflow-hidden h-3 rounded-full bg-slate-300 cursor-pointer transition-colors duration-200"></label>
                        </div>
                    </div>
                    <button class="text-slate-400 hover:text-blue-600 transition">
                        <i class="fa-solid fa-sliders text-xs"></i>
                    </button>
                </div>
            </div>

            <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm mb-1">
                <table class="w-full border-collapse text-left text-xs">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 font-semibold border-b border-slate-200">
                            <th class="p-2 w-10 text-center"><input type="checkbox" class="rounded border-slate-300"></th>
                            <th class="p-2 min-w-[80px]">Ngày</th>
                            <th class="p-2 min-w-[60px]">Giờ</th>
                            <th class="p-2 min-w-[130px]">Phương thức thanh toán</th>
                            <th class="p-2 min-w-[150px]">Mô tả</th>
                            <th class="p-2 min-w-[90px] text-right">Số tiền</th>
                            <th class="p-2 min-w-[60px] text-center">Tiền tệ</th>
                            <th class="p-2 min-w-[110px]">Người nhận</th>
                            <th class="p-2 min-w-[100px] text-center">Chứng từ</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-slate-100 hover:bg-slate-50/80 transition">
                            <td class="p-2 text-center align-middle"><input type="checkbox" class="rounded border-slate-300"></td>
                            <td class="p-2 font-medium text-slate-800 align-middle">24/06/2026</td>
                            <td class="p-2 text-slate-600 align-middle">09:01</td>
                            <td class="p-2 text-slate-800 align-middle">BT</td>
                            <td class="p-2 text-slate-600 align-middle">Deposit (Bank transfer)</td>
                            <td class="p-2 text-right font-mono font-semibold text-slate-900 align-middle">900,000</td>
                            <td class="p-2 text-center text-slate-500 align-middle">VND</td>
                            <td class="p-2 text-slate-700 font-medium align-middle">Admin</td>
                            <td class="p-2 text-center align-middle">
                                <div class="flex items-center justify-center space-x-1.5">
                                    <div class="relative group w-7 h-7 rounded border border-slate-200 overflow-hidden shadow-sm bg-white cursor-pointer flex-shrink-0">
                                        <img src="https://placehold.co/150x150/e2e8f0/64748b?text=UNC+1" alt="Chứng từ 1" class="w-full h-full object-cover">
                                        <div class="absolute inset-0 bg-slate-900/40 hidden group-hover:flex items-center justify-center transition-opacity">
                                            <i class="fa-solid fa-magnifying-glass-plus text-white text-[9px]"></i>
                                        </div>
                                    </div>
                                    <div class="relative group w-7 h-7 rounded border border-slate-200 overflow-hidden shadow-sm bg-white cursor-pointer flex-shrink-0">
                                        <img src="https://placehold.co/150x150/e2e8f0/64748b?text=UNC+2" alt="Chứng từ 2" class="w-full h-full object-cover">
                                        <div class="absolute inset-0 bg-slate-900/40 hidden group-hover:flex items-center justify-center transition-opacity">
                                            <i class="fa-solid fa-magnifying-glass-plus text-white text-[9px]"></i>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr class="border-b border-transparent h-8">
                            <td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="bg-white border-t border-slate-200 p-2.5 px-4 flex justify-between items-center">
            
            <div class="flex items-center space-x-2">
                <button class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition text-xs shadow-sm flex items-center space-x-1.5">
                    <i class="fa-solid fa-code-branch text-[10px]"></i>
                    <span>Tách</span>
                </button>
                <button class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition text-xs shadow-sm flex items-center space-x-1.5">
                    <i class="fa-solid fa-arrow-right-arrow-left text-[10px]"></i>
                    <span>Chuyển</span>
                </button>
            </div>

            <div class="flex items-center space-x-2">
                <button class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition text-xs shadow-sm flex items-center space-x-1.5">
                    <i class="fa-solid fa-trash-can text-[10px]"></i>
                    <span>Xóa</span>
                </button>
                <button class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition text-xs shadow-sm flex items-center space-x-1.5">
                    <i class="fa-solid fa-pen-to-square text-[10px]"></i>
                    <span>Sửa</span>
                </button>
                <button class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition text-xs shadow-sm flex items-center space-x-1.5">
                    <i class="fa-regular fa-floppy-disk text-[10px]"></i>
                    <span>Lưu</span>
                </button>
                <button class="px-5 py-1.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition flex items-center space-x-1.5 shadow-md text-xs tracking-wide">
                    <i class="fa-solid fa-plus text-[10px]"></i>
                    <span>Thêm</span>
                </button>
            </div>
            
        </div>

    </div>

</body>
</html>
